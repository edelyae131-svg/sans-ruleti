<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Casino Rulet Masası</title>
    <style>
        body { background-color: #0d3815; color: white; font-family: Arial, sans-serif; text-align: center; }
        .masa-container { max-width: 800px; margin: 20px auto; padding: 20px; border: 5px solid #c5a059; border-radius: 10px; background: #0b2e13; }
        .bahis-alanlari { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .alan { border: 2px solid #fff; padding: 15px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .alan:hover { background: rgba(255,255,255,0.2); }
        .fis-alani { display: flex; justify-content: center; gap: 15px; margin: 20px; }
        .fis { width: 60px; height: 60px; border-radius: 50%; border: 3px dashed #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; }
        .bakiye-paneli { font-size: 28px; color: #ffd700; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="bakiye-paneli">Denge: <span id="bakiye">10000</span> Coins</div>

    <div class="masa-container">
        <div class="bahis-alanlari">
            <div class="alan" onclick="bahisYap('0')">0</div>
            <div class="alan" onclick="bahisYap('1-12')">1-12</div>
            <div class="alan" onclick="bahisYap('Kirmizi')">Kırmızı</div>
            <div class="alan" onclick="bahisYap('Siyah')">Siyah</div>
            <div class="alan" onclick="bahisYap('Tek')">Tek</div>
            <div class="alan" onclick="bahisYap('Çift')">Çift</div>
        </div>
    </div>

    <div class="fis-alani">
        <div class="fis" style="background:#e91e63" onclick="fisSec(50)">50</div>
        <div class="fis" style="background:#2196f3" onclick="fisSec(500)">500</div>
        <div class="fis" style="background:#9c27b0" onclick="fisSec(5000)">5k</div>
    </div>

    <script>
        let bakiye = 10000;
        let seciliFis = 50;

        function fisSec(miktar) { seciliFis = miktar; alert("Seçili Fiş: " + miktar); }

        function bahisYap(alan) {
            if (bakiye >= seciliFis) {
                bakiye -= seciliFis;
                document.getElementById('bakiye').innerText = bakiye;
                alert(alan + " alanına " + seciliFis + " yatırıldı!");
            } else {
                alert("Yetersiz bakiye!");
            }
        }
    </script>
</body>
</html>
