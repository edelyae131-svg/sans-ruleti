<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siber Şans Ruleti</title>
    <style>
        /* Siber arka plan ve neon parlamalar */
        body {
            margin: 0;
            background: #0d0614;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 123, 255, 0.2) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(111, 66, 193, 0.25) 0%, transparent 40%);
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Arka plandaki siber ağ efekti */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0; left: 0;
            background-image: 
                linear-gradient(rgba(0, 242, 254, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 254, 0.04) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: 0;
            pointer-events: none;
        }

        h2 {
            margin-bottom: 30px; 
            letter-spacing: 3px;
            font-size: 28px;
            text-transform: uppercase;
            text-shadow: 0 0 10px #00f2fe, 0 0 20px #00f2fe;
            z-index: 1;
        }
        
        /* Çarkın etrafındaki parlayan siber neon halka */
        .wheel-container {
            position: relative;
            width: 370px;
            height: 370px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        .wheel-glow-ring {
            position: absolute;
            width: 364px;
            height: 364px;
            border-radius: 50%;
            box-shadow: 0 0 35px rgba(0, 242, 254, 0.7), inset 0 0 20px rgba(0, 242, 254, 0.5);
            border: 3px solid #00f2fe;
            pointer-events: none;
            z-index: 5;
        }

        #canvas {
            border-radius: 50%;
            transition: transform 4s cubic-bezier(0.1, 0.8, 0.1, 1);
            z-index: 2;
        }

        /* Parlak kırmızı damla ok */
        .pointer {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 18px solid transparent;
            border-right: 18px solid transparent;
            border-top: 35px solid #ff2a2a;
            filter: drop-shadow(0px 0px 10px #ff2a2a);
            z-index: 10;
        }

        /* Parlak yeşil buton */
        .btn {
            background: #00ff66;
            color: #000;
            border: none;
            padding: 16px 60px;
            font-size: 20px;
            font-weight: 900;
            border-radius: 30px;
            margin-top: 35px;
            cursor: pointer;
            box-shadow: 0 0 20px #00ff66, 0 0 40px rgba(0, 255, 102, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            z-index: 1;
        }

            transform: scale(1.05);
            box-shadow: 0 0 30px #00
