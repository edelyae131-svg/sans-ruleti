<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siber Şans Ruleti</title>
    <style>
        /* Görseldeki gibi koyu siber arka plan ve neon çizgiler */
        body {
            margin: 0;
            background: #0d0614;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 123, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(111, 66, 193, 0.2) 0%, transparent 40%);
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Arka plandaki o siber ağ efekti için süs çizgileri */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0; left: 0;
            background-image: 
                linear-gradient(rgba(0, 242, 254, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 254, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: 0;
            pointer-events: none;
        }

        h2 {
            margin-bottom: 30px; 
            letter-spacing: 3px;
            font-size: 28px;
            text-transform: uppercase;
            text-shadow: 0 0 10px #00f2fe, 0 0 20px #00f2fe;
            z-index: 1;
        }
        
        /* Çarkın etrafındaki o parlayan siber halka */
        .wheel-container {
            position: relative;
            width: 370px;
            height: 370px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        .wheel-glow-ring {
            position: absolute;
            width: 364px;
            height: 364px;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.6), inset 0 0 20px rgba(0, 242, 254, 0.4);
            border: 3px solid #00f2fe;
            pointer-events: none;
            z-index: 5;
        }

        #canvas {
            border-radius: 50%;
            transition: transform 4s cubic-bezier(0.1, 0.8, 0.1, 1);
            z-index: 2;
        }

        /* Tam görseldeki gibi tam yukarıda duran kırmızı damla ok */
        .pointer {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 18px solid transparent;
            border-right: 18px solid transparent;
            border-top: 35px solid #ff2a2a;
            filter: drop-shadow(0px 0px 8px #ff2a2a);
            z-index: 10;
        }

        /* Görseldeki o parlak yeşil siber buton */
        .btn {
            background: #00ff66;
            color: #000;
            border: none;
            padding: 16px 60px;
            font-size: 20px;
            font-weight: 900;
            border-radius: 30px;
            margin-top: 35px;
            cursor: pointer;
            box-shadow: 0 0 20px #00ff66, 0 0 40px rgba(0, 255, 102, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            z-index: 1;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px #00ff66, 0 0 50px rgba(0, 255, 102, 0.8);
        }

        .btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <h2>ŞANS RULETİ</h2>
    
    <div class="wheel-container">
        <div class="pointer"></div>
        <div class="wheel-glow-ring"></div>
        <canvas id="canvas" width="360" height="360"></canvas>
    </div>
    
    <button class="btn" onclick="ruletiCevir()">ÇEVİR (10 COIN)</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Ödüller
        const segments = ["500 Coins", "Hediye", "Pas", "3k", "10k", "30k"];
        // Görseldeki o capcanlı neon renk paleti
        const colors = ["#007bff", "#ffc107", "#e83e8c", "#28a745", "#fd7e14", "#6f42c1"];
        
        let currentRotation = 0;
        let isSpinning = false;

        function drawWheel() {
            const numSegments = segments.length;
            const anglePerSegment = (2 * Math.PI) / numSegments;

            ctx.clearRect(0, 0, 360, 360);

            for (let i = 0; i < numSegments; i++) {
                ctx.beginPath();
                ctx.moveTo(180, 180);
                ctx.arc(180, 180, 176, i * anglePerSegment, (i + 1) * anglePerSegment);
                ctx.fillStyle = colors[i];
                ctx.fill();
                
                // Dilimlerin beyaz siber çizgileri
                ctx.lineWidth = 2;
                ctx.strokeStyle = "rgba(255, 255, 255, 0.4)";
                ctx.stroke();

                // Yazıların tasarımı ve yerleşimi
                ctx.save();
                ctx.translate(180, 180);
                ctx.rotate(i * anglePerSegment + anglePerSegment / 2);
                ctx.fillStyle = "white";
                ctx.font = "bold 15px Arial";
                ctx.shadowColor = "rgba(0, 0, 0, 0.5)";
                ctx.shadowBlur = 4;
                ctx.textAlign = "right";
                ctx.fillText(segments[i], 155, 6);
                ctx.restore();
            }

            // Ortadaki siber göbek halkası
            ctx.beginPath();
            ctx.arc(180, 180, 25, 0, 2 * Math.PI);
            ctx.fillStyle = "#0d0614";
            ctx.fill();
            ctx.lineWidth = 3;
            ctx.strokeStyle = "#00f2fe";
            ctx.stroke();
        }

        function ruletiCevir() {
            if (isSpinning) return;
            isSpinning = true;

            let sans = Math.floor(Math.random() * 100) + 1;
            let hedefDilim = 0; 

            // Kazanma olasılıkları:
            if (sans <= 35) {
                hedefDilim = 2; // Pas (%35)
            } else if (sans <= 65) {
                hedefDilim = 0; // 500 Coins (%30)
            } else if (sans <= 80) {
                hedefDilim = 1; // Hediye (%15)
            } else if (sans <= 90) {
                hedefDilim = 3; // 3k (%10)
            } else if (sans <= 97) {
                hedefDilim = 4; // 10k (%7)
            } else {
                hedefDilim = 5; // 30k (%3)
            }

            let dilimAcisi = 360 / segments.length; 
            let hedefAci = currentRotation + 1800 + (270 - (hedefDilim * dilimAcisi) - (dilimAcisi / 2));
            
            currentRotation = hedefAci;
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                alert("Kazandığınız Ödül: " + segments[hedefDilim]);
                isSpinning = false;
            }, 4000);
        }

        drawWheel();
        setTimeout(drawWheel, 200);
    </script>
</body>
</html>
