<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Bahis Masası</title>
    <style>
        body { 
            background-color: #0b4e1a; /* Görseldeki yeşil tonu */
            color: white; 
            font-family: Arial, sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
        }

        .denge-header { 
            font-size: 32px; 
            font-weight: bold; 
            color: #ffd700; 
            margin-bottom: 30px; 
        }

        /* Dıştaki o büyük altın sarısı çerçeve */
        .ana-cerceve { 
            border: 4px solid #c5a059; 
            border-radius: 15px; 
            padding: 20px; 
            max-width: 800px; 
            margin: 0 auto; 
            background: rgba(0, 0, 0, 0.2);
        }

        .bahis-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 15px; 
        }

        .kutular { 
            border: 2px solid white; 
            padding: 25px 10px; 
            cursor: pointer; 
            font-size: 18px; 
            font-weight: bold; 
            border-radius: 5px; 
        }

        .kutular:hover { background: rgba(255,255,255,0.2); }

        /* Fişler */
        .fis-container { 
            margin-top: 50px; 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
        }
        .fis { 
            width: 70px; height: 70px; 
            border-radius: 50%; 
            border: 3px dashed white; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; cursor: pointer; 
        }
    </style>
</head>
<body>

    <div class="denge-header">Denge: <span id="bakiye">10000</span> Coins</div>

    <div class="ana-cerceve">
        <div class="bahis-grid">
            <div class="kutular" onclick="bahisYap()">0</div>
            <div class="kutular" onclick="bahisYap()">1-12</div>
            <div class="kutular" onclick="bahisYap()">Kırmızı</div>
            <div class="kutular" onclick="bahisYap()">Siyah</div>
            <div class="kutular" onclick="bahisYap()">Tek</div>
            <div class="kutular" onclick="bahisYap()">Çift</div>
        </div>
    </div>

    <div class="fis-container">
        <div class="fis" style="background:#e91e63">50</div>
        <div class="fis" style="background:#2196f3">500</div>
        <div class="fis" style="background:#9c27b0">5k</div>
    </div>

    <script>
        function bahisYap() {
            // Buraya tıklanınca yapılacak işlemler gelecek
            alert("Bahis alanına tıklandı!");
        }
    </script>
</body>
</html>
